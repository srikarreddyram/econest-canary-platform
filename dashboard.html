<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Econest · Canary Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap"
        rel="stylesheet" />
    <style>
        /* ── Reset & Tokens ─────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #080b0f;
            --surface: #0e1318;
            --border: #1c2530;
            --amber: #f5a623;
            --amber-dim: #7a5110;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #38bdf8;
            --muted: #4a5568;
            --text: #e2e8f0;
            --text-dim: #718096;
            --mono: 'Space Mono', monospace;
            --sans: 'Syne', sans-serif;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
        }

        /* ── Layout ─────────────────────────────────────────────── */
        .shell {
            display: grid;
            grid-template-rows: 56px 1fr;
            grid-template-columns: 260px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Header ─────────────────────────────────────────────── */
        header {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 28px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .logo-mark {
            width: 28px;
            height: 28px;
            border: 2px solid var(--amber);
            border-radius: 6px;
            display: grid;
            place-items: center;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--amber);
            letter-spacing: -1px;
        }

        .logo-text {
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.04em;
            color: var(--text);
        }

        .logo-text span {
            color: var(--amber);
        }

        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .pill {
            font-family: var(--mono);
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #0f2a14;
            color: var(--green);
            border: 1px solid #165526;
            letter-spacing: 0.08em;
        }

        .pill.offline {
            background: #2a0f0f;
            color: var(--red);
            border-color: #551616;
        }

        .clock {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
        }

        /* ── Sidebar ─────────────────────────────────────────────── */
        nav {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 24px 0;
            overflow-y: auto;
        }

        .nav-section {
            padding: 0 16px;
            margin-bottom: 24px;
        }

        .nav-label {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 0.15em;
            color: var(--muted);
            padding: 0 8px;
            margin-bottom: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            transition: background 0.15s, color 0.15s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .nav-item:hover {
            background: var(--border);
            color: var(--text);
        }

        .nav-item.active {
            background: #1f2d1a;
            color: var(--amber);
        }

        .nav-icon {
            font-size: 14px;
            width: 18px;
            text-align: center;
        }

        /* ── Main ─────────────────────────────────────────────────── */
        main {
            overflow-y: auto;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ── Section titles ─────────────────────────────────────── */
        .section-title {
            font-size: 11px;
            font-family: var(--mono);
            letter-spacing: 0.15em;
            color: var(--muted);
            margin-bottom: 14px;
        }

        /* ── Deploy Card ─────────────────────────────────────────── */
        .deploy-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 22px 24px;
        }

        .deploy-form {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        .repo-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .repo-input:focus {
            border-color: var(--amber);
        }

        .repo-input::placeholder {
            color: var(--muted);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.15s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--amber);
            color: #000;
            min-width: 120px;
        }

        .btn-danger {
            background: #2a0f0f;
            color: var(--red);
            border: 1px solid #551616;
            min-width: 100px;
        }

        /* ── Stage Pipeline ──────────────────────────────────────── */
        .pipeline-rail {
            display: flex;
            align-items: center;
            gap: 0;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .stage-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .stage-connector {
            flex: 1;
            height: 2px;
            background: var(--border);
            min-width: 20px;
            max-width: 40px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .stage-connector.active::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--amber);
            animation: slide-right 1s linear infinite;
        }

        @keyframes slide-right {
            from {
                transform: translateX(-100%);
            }

            to {
                transform: translateX(100%);
            }
        }

        .stage-bubble {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid var(--border);
            display: grid;
            place-items: center;
            font-size: 16px;
            transition: border-color 0.3s;
            position: relative;
        }

        .stage-bubble.success {
            border-color: var(--green);
            background: #0f2a14;
        }

        .stage-bubble.running {
            border-color: var(--amber);
            background: #1f2300;
            animation: pulse-ring 1.2s ease-in-out infinite;
        }

        .stage-bubble.failed {
            border-color: var(--red);
            background: #2a0f0f;
        }

        .stage-bubble.skipped {
            border-color: var(--muted);
            opacity: 0.5;
        }

        @keyframes pulse-ring {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(245, 166, 35, 0.4);
            }

            50% {
                box-shadow: 0 0 0 6px rgba(245, 166, 35, 0);
            }
        }

        .stage-label {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            text-align: center;
            max-width: 60px;
            line-height: 1.3;
        }

        /* ── Traffic Gauge ───────────────────────────────────────── */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .metric-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .metric-label {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 0.12em;
            color: var(--muted);
        }

        .metric-value {
            font-family: var(--mono);
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }

        .metric-value.green {
            color: var(--green);
        }

        .metric-value.amber {
            color: var(--amber);
        }

        .metric-value.red {
            color: var(--red);
        }

        .metric-bar-track {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .metric-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--amber);
            transition: width 0.5s ease;
        }

        .metric-bar-fill.green {
            background: var(--green);
        }

        .metric-bar-fill.red {
            background: var(--red);
        }

        .metric-sub {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--text-dim);
        }

        /* ── Decision Badge ─────────────────────────────────────── */
        .decision-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        .badge-promote {
            background: #0f2a14;
            color: var(--green);
            border: 1px solid #165526;
        }

        .badge-abort {
            background: #2a0f0f;
            color: var(--red);
            border: 1px solid #551616;
        }

        .badge-pending {
            background: var(--border);
            color: var(--muted);
        }

        /* ── History Table ───────────────────────────────────────── */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .history-table th {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-align: left;
            padding: 0 12px 10px;
            border-bottom: 1px solid var(--border);
        }

        .history-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
        }

        .history-table tr:last-child td {
            border-bottom: none;
        }

        .history-table tr:hover td {
            background: #0e1318;
            color: var(--text);
        }

        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .dot-running {
            background: var(--amber);
            animation: blink 1s ease-in-out infinite;
        }

        .dot-success {
            background: var(--green);
        }

        .dot-failed {
            background: var(--red);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* ── Console ─────────────────────────────────────────────── */
        .console-box {
            background: #05080b;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            font-family: var(--mono);
            font-size: 10.5px;
            color: #8ab4c8;
            line-height: 1.7;
            max-height: 240px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* ── Rollback Row ────────────────────────────────────────── */
        .rollback-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #130a0a;
            border: 1px solid #3a1515;
            border-radius: 10px;
            padding: 16px 20px;
        }

        .rollback-warning {
            font-size: 13px;
            color: var(--red);
            font-weight: 600;
        }

        .rollback-sub {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            margin-top: 3px;
        }

        /* ── Toast ───────────────────────────────────────────────── */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 18px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text);
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s;
            z-index: 999;
            max-width: 320px;
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Card wrapper ────────────────────────────────────────── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px 24px;
        }

        /* ── Empty state ─────────────────────────────────────────── */
        .empty {
            text-align: center;
            padding: 32px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
        }

        /* ── Scrollbar ───────────────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div class="shell">

        <!-- ── Header ───────────────────────────────────────────── -->
        <header>
            <div class="logo-mark">EC</div>
            <span class="logo-text">Eco<span>nest</span> · Canary Control</span>
            <div class="header-right">
                <span id="api-pill" class="pill offline">API OFFLINE</span>
                <span id="clock" class="clock">--:--:--</span>
            </div>
        </header>

        <!-- ── Sidebar ──────────────────────────────────────────── -->
        <nav>
            <div class="nav-section">
                <div class="nav-label">WORKSPACE</div>
                <button class="nav-item active" onclick="setView('deploy')">
                    <span class="nav-icon">🚀</span> Deploy
                </button>
                <button class="nav-item" onclick="setView('monitor')">
                    <span class="nav-icon">📡</span> Monitor
                </button>
                <button class="nav-item" onclick="setView('metrics')">
                    <span class="nav-icon">📊</span> MLflow Metrics
                </button>
                <button class="nav-item" onclick="setView('history')">
                    <span class="nav-icon">🗂</span> History
                </button>
                <button class="nav-item" onclick="setView('console')">
                    <span class="nav-icon">🖥</span> Console
                </button>
            </div>
            <div class="nav-section">
                <div class="nav-label">DANGER ZONE</div>
                <button class="nav-item" onclick="setView('rollback')" style="color:#ef4444;">
                    <span class="nav-icon">⚠️</span> Rollback
                </button>
            </div>

            <!-- Live summary -->
            <div class="nav-section" style="margin-top:auto; border-top:1px solid var(--border); padding-top:16px;">
                <div class="nav-label">LIVE STATUS</div>
                <div style="padding:8px 12px;">
                    <div id="sb-traffic"
                        style="font-family:var(--mono);font-size:22px;font-weight:700;color:var(--amber);">—%</div>
                    <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;">CANARY TRAFFIC
                    </div>
                    <div id="sb-build"
                        style="font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-top:8px;">Build #—
                    </div>
                    <div id="sb-result" style="font-family:var(--mono);font-size:10px;color:var(--muted);">—</div>
                </div>
            </div>
        </nav>

        <!-- ── Main ─────────────────────────────────────────────── -->
        <main id="main-content">
            <!-- content injected by JS -->
        </main>
    </div>

    <!-- ── Toast ───────────────────────────────────────────────── -->
    <div id="toast"></div>

    <script>
        // ── State ─────────────────────────────────────────────────────────────────
        const API = 'http://localhost:5001';
        let currentView = 'deploy';
        let state = {
            building: false,
            result: null,
            number: null,
            stages: [],
            metrics: [],
            history: [],
            console: '',
            trafficPct: 0,
        };

        // ── Stage map ─────────────────────────────────────────────────────────────
        const STAGE_MAP = [
            { name: 'Checkout', icon: '📦', key: 'Checkout' },
            { name: 'Install Deps', icon: '🔧', key: 'Install Dependencies' },
            { name: 'Verify DB', icon: '🗄️', key: 'Verify DB Structure' },
            { name: 'Canary 10%', icon: '🐤', key: 'Canary 10%' },
            { name: 'Risk Score', icon: '🤖', key: 'Evaluate Risk' },
            { name: 'Promote 50%', icon: '🚦', key: 'Promote 50%' },
            { name: 'Promote 100%', icon: '🚀', key: 'Promote 100%' },
        ];

        const TRAFFIC_BY_STAGE = {
            'Checkout': 0,
            'Install Dependencies': 0,
            'Verify DB Structure': 0,
            'Canary 10%': 10,
            'Evaluate Risk': 10,
            'Promote 50%': 50,
            'Promote 100%': 100,
        };

        // ── Clock ─────────────────────────────────────────────────────────────────
        setInterval(() => {
            document.getElementById('clock').textContent =
                new Date().toLocaleTimeString('en-GB');
        }, 1000);

        // ── API helpers ───────────────────────────────────────────────────────────
        async function apiFetch(path, opts = {}) {
            try {
                const r = await fetch(API + path, {
                    headers: { 'Content-Type': 'application/json' },
                    ...opts
                });
                return r.ok ? r.json() : null;
            } catch { return null; }
        }

        // ── Poll loop ─────────────────────────────────────────────────────────────
        async function poll() {
            const health = await apiFetch('/api/health');
            const pill = document.getElementById('api-pill');
            if (health) {
                pill.textContent = 'API ONLINE';
                pill.className = 'pill';
            } else {
                pill.textContent = 'API OFFLINE';
                pill.className = 'pill offline';
            }

            const [status, metrics, history, consoleData] = await Promise.all([
                apiFetch('/api/status'),
                apiFetch('/api/metrics'),
                apiFetch('/api/history'),
                apiFetch('/api/console'),
            ]);

            if (status) {
                state.building = status.building;
                state.result = status.result;
                state.number = status.number;
                state.stages = status.stages || [];

                // Infer traffic from last successful stage
                let traffic = 0;
                for (const s of state.stages) {
                    if (s.status === 'SUCCESS' && TRAFFIC_BY_STAGE[s.name] !== undefined) {
                        traffic = Math.max(traffic, TRAFFIC_BY_STAGE[s.name]);
                    }
                }
                state.trafficPct = traffic;

                // Sidebar update
                document.getElementById('sb-traffic').textContent = `${traffic}%`;
                document.getElementById('sb-build').textContent = `Build #${state.number || '—'}`;
                const resultEl = document.getElementById('sb-result');
                resultEl.textContent = state.building ? 'RUNNING…' : (state.result || '—');
                resultEl.style.color = state.building ? 'var(--amber)' :
                    state.result === 'SUCCESS' ? 'var(--green)' :
                        state.result === 'FAILURE' ? 'var(--red)' : 'var(--muted)';
            }

            if (metrics) state.metrics = metrics;
            if (history) state.history = history;
            if (consoleData) state.console = consoleData.log || '';

            render();
        }

        setInterval(poll, 3000);
        poll();

        // ── View router ───────────────────────────────────────────────────────────
        function setView(v) {
            currentView = v;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            render();
        }

        function render() {
            const el = document.getElementById('main-content');
            switch (currentView) {
                case 'deploy': el.innerHTML = renderDeploy(); break;
                case 'monitor': el.innerHTML = renderMonitor(); break;
                case 'metrics': el.innerHTML = renderMetrics(); break;
                case 'history': el.innerHTML = renderHistory(); break;
                case 'console': el.innerHTML = renderConsole(); break;
                case 'rollback': el.innerHTML = renderRollback(); break;
            }
        }

        // ── Render: Deploy ────────────────────────────────────────────────────────
        function renderDeploy() {
            return `
    <div class="section-title">SUBMIT PROJECT TO CANARY PIPELINE</div>
    <div class="deploy-card">
      <div style="font-size:14px;font-weight:600;margin-bottom:6px;">GitHub Repository</div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:16px;">
        Paste any public GitHub repo URL — the pipeline will clone, verify, score, and progressively deploy it.
      </div>
      <div class="deploy-form">
        <input id="repo-input" class="repo-input"
          placeholder="https://github.com/username/repo.git"
          value="https://github.com/srikarreddyram/econest-canary-platform.git"/>
        <button class="btn btn-primary" onclick="triggerDeploy()">
          ⚡ Deploy
        </button>
      </div>
    </div>

    <div class="section-title" style="margin-top:8px;">PIPELINE STAGES</div>
    <div class="card">
      ${renderPipelineRail()}
    </div>

    <div class="section-title" style="margin-top:8px;">LIVE TRAFFIC</div>
    <div class="metrics-grid">
      ${renderTrafficCard()}
      ${renderBuildCard()}
    </div>
  `;
        }

        // ── Render: Monitor ───────────────────────────────────────────────────────
        function renderMonitor() {
            return `
    <div class="section-title">PIPELINE MONITOR</div>
    <div class="card">
      ${renderPipelineRail()}
    </div>
    <div class="section-title" style="margin-top:8px;">TRAFFIC + BUILD</div>
    <div class="metrics-grid">
      ${renderTrafficCard()}
      ${renderBuildCard()}
    </div>
  `;
        }

        function renderPipelineRail() {
            const stageStatus = {};
            for (const s of state.stages) {
                stageStatus[s.name] = s.status; // SUCCESS | FAILED | IN_PROGRESS | NOT_EXECUTED
            }

            let html = '<div class="pipeline-rail">';
            STAGE_MAP.forEach((s, i) => {
                const raw = stageStatus[s.key];
                let cls = 'skipped';
                if (raw === 'SUCCESS') cls = 'success';
                else if (raw === 'FAILED') cls = 'failed';
                else if (raw === 'IN_PROGRESS') cls = 'running';

                const emoji = raw === 'SUCCESS' ? '✅' :
                    raw === 'FAILED' ? '❌' :
                        raw === 'IN_PROGRESS' ? '⚙️' : s.icon;

                html += `<div class="stage-node">
      <div class="stage-bubble ${cls}">${emoji}</div>
      <div class="stage-label">${s.name}</div>
    </div>`;

                if (i < STAGE_MAP.length - 1) {
                    const connActive = raw === 'IN_PROGRESS' ? 'active' : '';
                    html += `<div class="stage-connector ${connActive}"></div>`;
                }
            });
            html += '</div>';
            return html;
        }

        function renderTrafficCard() {
            const pct = state.trafficPct;
            const color = pct === 100 ? 'green' : pct > 0 ? 'amber' : '';
            return `
    <div class="metric-card">
      <div class="metric-label">CANARY TRAFFIC</div>
      <div class="metric-value ${color}">${pct}%</div>
      <div class="metric-bar-track">
        <div class="metric-bar-fill ${color}" style="width:${pct}%"></div>
      </div>
      <div class="metric-sub">${pct === 0 ? 'No traffic routed yet' :
                    pct === 10 ? 'Canary phase — 10% live' :
                        pct === 50 ? 'Half-traffic promotion' :
                            pct === 100 ? 'Full production rollout' : '—'
                }</div>
    </div>`;
        }

        function renderBuildCard() {
            const building = state.building;
            const result = state.result;
            const color = building ? 'amber' : result === 'SUCCESS' ? 'green' : result === 'FAILURE' ? 'red' : '';
            const label = building ? 'RUNNING…' : result || 'IDLE';
            return `
    <div class="metric-card">
      <div class="metric-label">BUILD STATUS</div>
      <div class="metric-value ${color}" style="font-size:20px;padding-top:4px;">${label}</div>
      <div class="metric-sub">Build #${state.number || '—'}</div>
    </div>`;
        }

        // ── Render: MLflow Metrics ────────────────────────────────────────────────
        function renderMetrics() {
            if (!state.metrics.length) {
                return `
      <div class="section-title">MLFLOW METRICS</div>
      <div class="card"><div class="empty">No MLflow runs found yet.<br/>Run a pipeline first.</div></div>`;
            }

            const latest = state.metrics[0];
            const latency = latest.metrics?.latency_p95;
            const errorRate = latest.metrics?.error_rate;
            const decision = latest.params?.decision;

            const latencyColor = latency > 130 ? 'red' : latency > 90 ? 'amber' : 'green';
            const errorColor = errorRate > 0.04 ? 'red' : errorRate > 0.02 ? 'amber' : 'green';
            const latencyPct = latency ? Math.min((latency / 150) * 100, 100) : 0;
            const errorPct = errorRate ? Math.min((errorRate / 0.05) * 100, 100) : 0;

            const badgeCls = decision === 'PROMOTE' ? 'badge-promote' :
                decision === 'ABORT' ? 'badge-abort' : 'badge-pending';
            const badgeIcon = decision === 'PROMOTE' ? '✅' : decision === 'ABORT' ? '❌' : '⏳';

            let historyRows = state.metrics.slice(0, 8).map((r, i) => {
                const l = r.metrics?.latency_p95?.toFixed(1) ?? '—';
                const e = r.metrics?.error_rate?.toFixed(4) ?? '—';
                const d = r.params?.decision ?? '—';
                const ts = r.timestamp ? new Date(r.timestamp).toLocaleTimeString() : '—';
                const dotColor = d === 'PROMOTE' ? 'var(--green)' : d === 'ABORT' ? 'var(--red)' : 'var(--muted)';
                return `<tr>
      <td style="color:var(--text-dim);font-size:10px;">${r.run_id.slice(0, 8)}…</td>
      <td>${l} ms</td>
      <td>${e}</td>
      <td><span style="color:${dotColor};font-weight:700;">${d}</span></td>
      <td>${ts}</td>
    </tr>`;
            }).join('');

            return `
    <div class="section-title">MLFLOW METRICS — LATEST RUN</div>
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">LATENCY P95</div>
        <div class="metric-value ${latencyColor}">${latency?.toFixed(1) ?? '—'}<span style="font-size:14px;">ms</span></div>
        <div class="metric-bar-track"><div class="metric-bar-fill ${latencyColor}" style="width:${latencyPct}%"></div></div>
        <div class="metric-sub">Threshold: 130ms</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">ERROR RATE</div>
        <div class="metric-value ${errorColor}">${errorRate != null ? (errorRate * 100).toFixed(2) : '—'}<span style="font-size:14px;">%</span></div>
        <div class="metric-bar-track"><div class="metric-bar-fill ${errorColor}" style="width:${errorPct}%"></div></div>
        <div class="metric-sub">Threshold: 4%</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">RISK DECISION</div>
        <div style="margin-top:8px;">
          <span class="decision-badge ${badgeCls}">${badgeIcon} ${decision ?? 'PENDING'}</span>
        </div>
        <div class="metric-sub" style="margin-top:10px;">Run: ${latest.run_id.slice(0, 12)}…</div>
      </div>
    </div>

    <div class="section-title" style="margin-top:8px;">RUN HISTORY</div>
    <div class="card" style="padding:0 0 4px;">
      <table class="history-table">
        <thead><tr>
          <th>RUN ID</th><th>LATENCY</th><th>ERR RATE</th><th>DECISION</th><th>TIME</th>
        </tr></thead>
        <tbody>${historyRows || '<tr><td colspan="5" class="empty">No runs yet</td></tr>'}</tbody>
      </table>
    </div>`;
        }

        // ── Render: History ───────────────────────────────────────────────────────
        function renderHistory() {
            const rows = state.history.map(h => {
                const dotCls = h.status === 'running' ? 'dot-running' :
                    h.status === 'success' ? 'dot-success' : 'dot-failed';
                const ts = h.triggered ? new Date(h.triggered).toLocaleString() : '—';
                const repo = h.repo_url.length > 48 ? h.repo_url.slice(0, 48) + '…' : h.repo_url;
                return `<tr>
      <td><span class="status-dot ${dotCls}"></span>${h.status.toUpperCase()}</td>
      <td>${repo}</td>
      <td>${ts}</td>
    </tr>`;
            }).join('');

            return `
    <div class="section-title">DEPLOYMENT HISTORY</div>
    <div class="card" style="padding:0 0 4px;">
      <table class="history-table">
        <thead><tr><th>STATUS</th><th>REPOSITORY</th><th>TRIGGERED</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="3"><div class="empty">No deployments this session.</div></td></tr>'}</tbody>
      </table>
    </div>`;
        }

        // ── Render: Console ───────────────────────────────────────────────────────
        function renderConsole() {
            return `
    <div class="section-title">JENKINS CONSOLE OUTPUT — LAST BUILD</div>
    <div class="console-box">${state.console
                    ? escapeHtml(state.console)
                    : 'No console output available. Check that Jenkins is running.'
                }</div>`;
        }

        // ── Render: Rollback ──────────────────────────────────────────────────────
        function renderRollback() {
            return `
    <div class="section-title">EMERGENCY ROLLBACK</div>
    <div class="rollback-row">
      <div>
        <div class="rollback-warning">⚠️  Initiate Emergency Rollback</div>
        <div class="rollback-sub">Routes 0% traffic to canary · Triggers deploy_script.sh 0 via Jenkins</div>
      </div>
      <button class="btn btn-danger" onclick="triggerRollback()">🔴 Rollback Now</button>
    </div>
    <div class="section-title" style="margin-top:16px;">WHAT THIS DOES</div>
    <div class="card" style="font-family:var(--mono);font-size:11px;color:var(--text-dim);line-height:2;">
      1. Triggers a new Jenkins build with FORCE_ROLLBACK=true<br/>
      2. Skips all validation and promotion stages<br/>
      3. Immediately runs deploy_script.sh 0 → routes 0% to canary<br/>
      4. Marks build as FAILED in history for audit trail
    </div>`;
        }

        // ── Actions ───────────────────────────────────────────────────────────────
        async function triggerDeploy() {
            const url = document.getElementById('repo-input')?.value?.trim();
            if (!url) return toast('⚠️ Enter a repository URL first.');

            toast('🚀 Triggering deployment…');
            const res = await apiFetch('/api/deploy', {
                method: 'POST',
                body: JSON.stringify({ repo_url: url })
            });

            if (res?.success) {
                toast('✅ Build triggered successfully!');
                poll();
            } else {
                toast(`❌ ${res?.message || 'Could not reach Jenkins. Is it running?'}`);
            }
        }

        async function triggerRollback() {
            if (!confirm('Are you sure? This will immediately route 0% traffic to the canary.')) return;
            toast('⚠️ Initiating rollback…');
            const res = await apiFetch('/api/rollback', { method: 'POST' });
            toast(res?.success ? '🔴 Rollback triggered.' : `❌ ${res?.message || 'Rollback failed.'}`);
            poll();
        }

        // ── Utils ─────────────────────────────────────────────────────────────────
        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        let toastTimer;
        function toast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
        }

        // ── Initial render ────────────────────────────────────────────────────────
        render();
    </script>
</body>

</html>
